{{ define "content" }}
<div class="application-main">
  <main>
    <div class="gisthead pagehead bg-gray-light pb-0 pt-3 mb-4">
      <div class="px-0">
        <div class="mb-3 d-flex px-3 px-md-3 px-lg-5">
          <div class="flex-auto min-width-0 width-fit mr-3">
            <div class="d-flex">
              <div class="d-none d-md-block">
                <a class="avatar mr-2 flex-shrink-0" href="{{ .Site.BaseURL }}">
                  <img class="avatar-user"
                    src="{{ with $.Site.Params.avatar }}{{ $.Site.Params.avatar }}{{ else }}{{ "images/avatar.png" | absURL }}{{ end }}"
                    width="32" height="32">
                </a>
              </div>
              <div class="d-flex flex-column">
                <h1 class="break-word f3 text-normal mb-md-0 mb-1">
                  <span class="author">
                    <a href="{{ .Site.BaseURL }}">{{ .Site.Params.author }}</a>
                  </span>
                  <span class="path-divider">/</span>
                  <strong class="css-truncate css-truncate-target mr-1">
                    {{ .Title }}
                  </strong>
                </h1>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container-lg px-3 new-discussion-timeline">
      <div class="repository-content gist-content">
        <div>
          <article class="markdown-body entry-content container-lg f5" style="padding: 30px;">
            {{ .Content }}
          </article>
        </div>
      </div>
    </div>
  </main>
</div>
{{ end }}
